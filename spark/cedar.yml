model_name: "cedar"
target_phrase:
  - "cedar"
  - "hey cedar"          # one binary model; fires on either phrase
custom_negative_phrases:
  - "seeder"
  - "ceder"
  - "see there"
  - "see her"
  - "seed her"
  - "cedar wood"
  - "cedar tree"
  - "leader"
  - "reader"
  - "heater"
  - "either"
  - "theater"
  - "hey seeder"
  - "hey see there"
  - "hey reader"
  - "hey leader"
n_samples: 20000
n_samples_val: 2000
tts_batch_size: 100      # GB10 unified memory has plenty of headroom; adv-negative gen uses batch/7
augmentation_batch_size: 16
augmentation_rounds: 1
piper_sample_generator_path: "./piper-sample-generator"
output_dir: "./my_custom_model"
rir_paths:
  - "./mit_rirs"
background_paths:
  - "./audioset_16k"
  - "./fma"
background_paths_duplication_rate:
  - 1
false_positive_validation_data_path: "./validation_set_features.npy"
feature_data_files:
  "ACAV100M_sample": "./openwakeword_features_ACAV100M_2000_hrs_16bit.npy"
batch_n_per_class:
  "ACAV100M_sample": 1024
  "adversarial_negative": 50
  "positive": 50
model_type: "dnn"
layer_size: 32
steps: 50000
max_negative_weight: 1500
target_false_positives_per_hour: 0.2
